<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Skill India Connect</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Skill India Connect</a>
  </nav>

  <main>
    <div class="form-container">
      <h2 class="section-title" style="margin-bottom: 1.5rem;">Create Account</h2>
      
      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" required>
            <option value="learner">Learner</option>
            <option value="recruiter">Recruiter</option>
          </select>
        </div>

        <div id="error-message" class="hidden" style="color: red; margin-bottom: 1rem; font-size: 0.875rem;"></div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
      
      <p class="text-center mt-4">
        Already have an account? <a href="login.html" style="color: var(--primary);">Login</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      
      try {
        await Auth.register({ name, email, password, role });
        window.location.href = 'dashboard-learner.html'; // Default redirect
      } catch (err) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = err.message || 'Registration failed';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
