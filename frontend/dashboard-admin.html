<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Skill India Connect</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Skill India Connect</a>
    <div class="nav-links">
      <span id="user-greeting" style="font-weight: 500; margin-right: 1rem;"></span>
      <a href="#" class="btn btn-outline" id="nav-logout">Logout</a>
    </div>
  </nav>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li><a href="#" class="active">Manage Courses</a></li>
      </ul>
    </aside>

    <main class="dashboard-content">
      <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
        <h2 class="section-title" style="margin-bottom: 0;">Add Course</h2>
      </div>

      <div class="card form-container" style="margin: 0; max-width: 600px;">
        <form id="course-form">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="course-title" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="course-desc" rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label>Instructor</label>
            <input type="text" id="course-inst" required>
          </div>
          <div class="flex" style="gap: 1rem;">
            <div class="form-group" style="flex: 1;">
              <label>Duration</label>
              <input type="text" id="course-dur" placeholder="e.g. 4 Weeks" required>
            </div>
            <div class="form-group" style="flex: 1;">
              <label>Price</label>
              <input type="number" id="course-price" required>
            </div>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="course-cat" required>
          </div>
          <button type="submit" class="btn btn-primary">Add Course</button>
        </form>
      </div>

    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    if (!Auth.isAuthenticated() || Auth.getUser().role !== 'admin') {
      window.location.href = 'login.html';
    }

    const user = Auth.getUser();
    document.getElementById('user-greeting').textContent = `Admin: ${user.name}`;

    document.getElementById('course-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const courseData = {
        title: document.getElementById('course-title').value,
        description: document.getElementById('course-desc').value,
        instructor: document.getElementById('course-inst').value,
        duration: document.getElementById('course-dur').value,
        price: document.getElementById('course-price').value,
        category: document.getElementById('course-cat').value
      };

      try {
        await API.post('/courses', courseData);
        alert('Course created successfully!');
        e.target.reset();
      } catch (err) {
        alert('Error creating course: ' + err.message);
      }
    });
  </script>
</body>
</html>
