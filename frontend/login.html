<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Skill India Connect</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Skill India Connect</a>
  </nav>

  <main>
    <div class="form-container">
      <h2 class="section-title" style="margin-bottom: 1.5rem;">Welcome Back</h2>
      <p class="text-center text-muted mb-4">Login to access your dashboard</p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <div id="error-message" class="hidden" style="color: red; margin-bottom: 1rem; font-size: 0.875rem;"></div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
      
      <p class="text-center mt-4">
        Don't have an account? <a href="register.html" style="color: var(--primary);">Register</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        await Auth.login(email, password);
        window.location.href = 'dashboard-learner.html'; // Default redirect, actual redirect inside Auth.login
      } catch (err) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = err.message || 'Login failed';
        errorDiv.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
